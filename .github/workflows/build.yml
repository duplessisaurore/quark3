name: Build quark_stds

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build quark_std
        run: cargo build -p quark_std --release

      - name: Build quark_std_disasm
        run: cargo build -p quark_std_disasm --release